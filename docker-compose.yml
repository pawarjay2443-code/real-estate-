version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: realestate_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: realestate
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: realestate_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build: .
    container_name: realestate_api
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/realestate?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_ACCESS_SECRET=real_estate_jwt_access_secret_2026_long_key
      - JWT_REFRESH_SECRET=real_estate_jwt_refresh_secret_2026_long_key
      - JWT_ACCESS_EXPIRES_IN=15m
      - JWT_REFRESH_EXPIRES_IN=7d
      - EMAIL_HOST=smtp.mailtrap.io
      - EMAIL_PORT=2525
      - EMAIL_USER=mock_smtp_user
      - EMAIL_PASS=mock_smtp_pass
      - EMAIL_FROM=noreply@realestateapp.com
      - UPLOAD_DIR=/app/public/uploads
    depends_on:
      - postgres
      - redis
    volumes:
      - upload_data:/app/public/uploads

volumes:
  postgres_data:
  redis_data:
  upload_data:
